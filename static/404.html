<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>404 — Ihsan Mohamad</title>
		<meta name="robots" content="noindex" />
		<style>
			:root {
				--bg: #fcfaf7;
				--ink: #0f172a;
				--muted: #475569;
				--accent: #f97316;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				height: 100%;
			}
			body {
				font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				background: var(--bg);
				color: var(--ink);
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 2rem;
			}
			.card {
				max-width: 32rem;
				text-align: center;
			}
			.eyebrow {
				font-size: 0.75rem;
				font-weight: 700;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				color: var(--accent);
				margin-bottom: 1.5rem;
			}
			h1 {
				font-family: 'Syne', 'Space Grotesk', sans-serif;
				font-size: clamp(3.5rem, 10vw, 7.5rem);
				font-weight: 700;
				line-height: 0.9;
				letter-spacing: -0.02em;
			}
			h1 em {
				font-weight: 400;
				font-style: italic;
			}
			p {
				margin-top: 1.5rem;
				font-size: 1.125rem;
				line-height: 1.625;
				color: var(--muted);
			}
			.actions {
				margin-top: 2.5rem;
				display: flex;
				gap: 1rem;
				justify-content: center;
				flex-wrap: wrap;
			}
			.btn {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				padding: 1rem 2.5rem;
				border-radius: 9999px;
				font-size: 0.75rem;
				font-weight: 700;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				text-decoration: none;
				transition:
					background 0.3s,
					color 0.3s;
			}
			.btn-primary {
				background: var(--ink);
				color: var(--bg);
			}
			.btn-primary:hover {
				background: var(--accent);
				color: #000;
			}
			.btn-ghost {
				border: 1px solid rgba(15, 23, 42, 0.2);
				color: var(--ink);
				background: transparent;
				cursor: pointer;
				font-family: inherit;
			}
			.btn-ghost:hover {
				border-color: var(--accent);
				color: var(--accent);
			}
		</style>
	</head>
	<body>
		<main class="card">
			<p class="eyebrow">404</p>
			<h1>Nothing <em>here.</em></h1>
			<p>
				The page you’re looking for has moved or never existed. Try a link from the menu, or head
				back home.
			</p>
			<div class="actions">
				<a class="btn btn-primary" href="/en/">Back to home</a>
				<button class="btn btn-ghost" type="button" onclick="history.back()">Go back</button>
			</div>
		</main>
	</body>
</html>
