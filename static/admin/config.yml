# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: ihsanmohamad/portfolio-ihsan
  branch: main
  commit_author: Sveltia CMS <noreply@sveltiacms.app>

media_folder: /static/uploads
public_folder: /uploads

media_libraries:
  default:
    config:
      max_file_size: 5242880
      slugify_filename: true
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2000
          height: 2000

output:
  omit_empty_optional_fields: true
  yaml:
    quote: none
    indent_size: 2
    indent_sequences: true
  json:
    indent_style: space
    indent_size: 2

singletons:
  - name: profile
    label: Profile
    icon: user
    file: /src/content/site/profile.yaml
    fields:
      - { name: name, label: Name, widget: string, required: true }
      - { name: tagline, label: Tagline, widget: string, required: true, hint: 'Short headline, e.g. "Software Developer".' }
      - { name: location, label: Location, widget: string, required: true }
      - { name: email, label: Email, widget: string, required: true }
      - { name: phone, label: Phone, widget: string, required: false }
      - { name: website, label: Website, widget: string, required: false }
      - { name: summary, label: Summary, widget: text, required: true }
      - name: languages
        label: Languages
        widget: list
        field: { name: language, label: Language, widget: string }

  - name: site_nav
    label: Site Navigation
    icon: menu
    file: /src/content/site/nav.yaml
    fields:
      - name: items
        label: Menu Items
        label_singular: Menu Item
        widget: list
        hint: Drag to reorder. Click the three-dot menu to edit the slug.
        summary: '{{fields.label}} — {{fields.path}}'
        fields:
          - { name: id, widget: hidden, default: '{{uuid}}' }
          - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
          - { name: label, label: Label, widget: string, required: true }
          - { name: path, label: Path, widget: string, required: true, pattern: ['^/[A-Za-z0-9/_\-]+$', 'Use a path starting with /, like /about.'] }
          - { name: external, label: External, widget: boolean, default: false }

  - name: site_footer
    label: Site Footer
    icon: anchor
    file: /src/content/site/footer.yaml
    fields:
      - { name: tagline, label: Tagline, widget: text, required: true }
      - name: socials
        label: Social Links
        label_singular: Social Link
        widget: list
        summary: '{{fields.label}} — {{fields.url}}'
        fields:
          - { name: id, widget: hidden, default: '{{uuid}}' }
          - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
          - { name: label, label: Label, widget: string, required: true }
          - { name: url, label: URL, widget: string, required: true, pattern: ['^(https?:|mailto:|/)[^\\s]+$', 'Provide a full URL (https://...), a mailto:, or a site path (/contact).'] }

collections:
  - name: experience
    label: Experience
    label_singular: Experience Entry
    folder: /src/content/experience
    format: json
    identifier_field: company
    slug: '{{fields._slug}}'
    summary: '{{role}} — {{company}} ({{startDate}} – {{endDate}})'
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
      - { name: company, label: Company, widget: string, required: true }
      - { name: role, label: Role, widget: string, required: true }
      - { name: location, label: Location, widget: string, required: true }
      - { name: startDate, label: Start Date, widget: string, required: true, hint: 'YYYY-MM, e.g. 2025-08' }
      - { name: endDate, label: End Date, widget: string, required: false, hint: 'YYYY-MM or leave empty if current' }
      - { name: current, label: Current Role, widget: boolean, default: false }
      - { name: description, label: Description, widget: text, required: true }
      - name: bullets
        label: Highlights
        widget: list
        field: { name: bullet, label: Bullet, widget: text }
      - { name: link, label: Company Link, widget: string, required: false }

  - name: projects
    label: Projects
    label_singular: Project
    folder: /src/content/projects
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    slug: '{{fields._slug}}'
    preview_path: '/projects/{{slug}}'
    summary: '{{title}} — {{category}} ({{year}})'
    thumbnail: imageUrl
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
      - { name: title, label: Title, widget: string, required: true }
      - { name: category, label: Category, widget: string, required: true }
      - { name: year, label: Year, widget: string, required: true, pattern: ['^20[0-9]{2}$', 'Use a four-digit year, e.g. 2024.'] }
      - { name: shortDescription, label: Short Description, widget: text, required: true }
      - { name: imageUrl, label: Image, widget: image, required: false }
      - name: tech
        label: Tech Stack
        widget: list
        field: { name: item, label: Item, widget: string }
      - { name: liveUrl, label: Live URL, widget: string, required: false }
      - { name: repoUrl, label: Repo URL, widget: string, required: false }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: body, label: Case Study, widget: richtext, required: true }

  - name: certifications
    label: Certifications
    label_singular: Certification
    folder: /src/content/certifications
    format: json
    identifier_field: title
    slug: '{{fields._slug}}'
    summary: '{{title}} — {{issuer}} ({{issueDate}})'
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
      - { name: title, label: Title, widget: string, required: true }
      - { name: issuer, label: Issuer, widget: string, required: true }
      - { name: issueDate, label: Issue Date, widget: string, required: true, hint: 'Month YYYY, e.g. December 2024' }
      - { name: credentialUrl, label: Credential URL, widget: string, required: false }
      - { name: description, label: Description, widget: text, required: true }

  - name: awards
    label: Awards
    label_singular: Award
    folder: /src/content/awards
    format: json
    identifier_field: title
    slug: '{{fields._slug}}'
    summary: '{{title}} — {{issuer}} ({{date}})'
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
      - { name: title, label: Title, widget: string, required: true }
      - { name: issuer, label: Issuer, widget: string, required: true }
      - { name: date, label: Date, widget: string, required: true, hint: 'Month YYYY, e.g. October 2022' }
      - { name: achievement, label: Achievement, widget: string, required: false, hint: 'e.g. First-Runner Up' }
      - { name: description, label: Description, widget: text, required: true }

  - name: skills
    label: Skills
    label_singular: Skill Group
    folder: /src/content/skills
    format: json
    identifier_field: category
    slug: '{{fields._slug}}'
    summary: '{{category}} ({{items.length}})'
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: order, label: Display Order, widget: number, value_type: int, min: 1, default: 1 }
      - { name: category, label: Category, widget: string, required: true, hint: 'e.g. Languages, Frameworks, Cloud' }
      - name: items
        label: Skills
        widget: list
        field: { name: skill, label: Skill, widget: string }

  - name: posts
    label: Blog Posts
    label_singular: Blog Post
    folder: /src/content/posts
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    slug: '{{fields._slug}}'
    preview_path: '/blog/{{slug}}'
    summary: '{{title}} — {{publishedAt}}'
    thumbnail: imageUrl
    fields:
      - { name: id, widget: hidden, default: '{{uuid}}' }
      - { name: title, label: Title, widget: string, required: true }
      - { name: publishedAt, label: Published Date, widget: datetime, type: date, required: true, default: '{{now}}' }
      - { name: category, label: Category, widget: string, required: true }
      - { name: author, label: Author, widget: string, default: 'Ihsan Mohamad' }
      - { name: readingMinutes, label: Reading Time, widget: number, value_type: int, min: 1, max: 60, default: 5 }
      - { name: excerpt, label: Excerpt, widget: text, required: true }
      - { name: imageUrl, label: Cover Image, widget: image, required: false }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: body, label: Article, widget: richtext, required: true }
